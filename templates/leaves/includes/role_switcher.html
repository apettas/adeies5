{% if role_nav_items|length > 1 %}
<div class="role-switcher-bar">
    <div class="container-fluid">
        <div class="d-flex flex-wrap align-items-center gap-2">
            <span class="text-muted small me-1 d-none d-sm-inline">Ρόλος</span>
            {% for item in role_nav_items %}
            <a href="{{ item.url }}"
               class="role-pill {% if item.is_active %}active{% endif %} position-relative">
                <i class="bi {{ item.icon }}"></i>
                <span>{{ item.label }}</span>
                {% if item.badge %}
                <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size:0.65rem;">
                    {{ item.badge }}
                </span>
                {% endif %}
            </a>
            {% endfor %}
        </div>
    </div>
</div>
{% endif %}

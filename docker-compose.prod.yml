services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./backups:/backups
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=el_GR.UTF-8 --lc-ctype=el_GR.UTF-8"
    networks:
      - pdede_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - pdede_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: 
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - private_media_volume:/app/private_media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-False}
      - SECURE_HSTS_SECONDS=${SECURE_HSTS_SECONDS:-0}
      - SECURE_HSTS_INCLUDE_SUBDOMAINS=${SECURE_HSTS_INCLUDE_SUBDOMAINS:-False}
      - SECURE_HSTS_PRELOAD=${SECURE_HSTS_PRELOAD:-False}
      - SECURE_CONTENT_TYPE_NOSNIFF=${SECURE_CONTENT_TYPE_NOSNIFF:-True}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-False}
      - SESSION_COOKIE_HTTPONLY=${SESSION_COOKIE_HTTPONLY:-True}
      - SESSION_COOKIE_SAMESITE=${SESSION_COOKIE_SAMESITE:-Lax}
      - CSRF_COOKIE_SECURE=${CSRF_COOKIE_SECURE:-False}
      - CSRF_COOKIE_HTTPONLY=${CSRF_COOKIE_HTTPONLY:-False}
      - CSRF_COOKIE_SAMESITE=${CSRF_COOKIE_SAMESITE:-Lax}
      - USE_X_FORWARDED_PROTO=${USE_X_FORWARDED_PROTO:-True}
      - CAS_SERVER_URL=${CAS_SERVER_URL}
      - CAS_ROOT_PROXIED_AS=${CAS_ROOT_PROXIED_AS:-}
      - CAS_FORCE_SSL_SERVICE_URL=${CAS_FORCE_SSL_SERVICE_URL:-True}
      - CAS_VERIFY_SSL_CERTIFICATE=${CAS_VERIFY_SSL_CERTIFICATE:-}
      - EMAIL_HOST=${EMAIL_HOST:-mail.sch.gr}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      - EMAIL_USE_SSL=${EMAIL_USE_SSL:-True}
      - EMAIL_USE_TLS=${EMAIL_USE_TLS:-False}
      - EMAIL_HOST_USER=${EMAIL_HOST_USER:-}
      - EMAIL_HOST_PASSWORD=${EMAIL_HOST_PASSWORD:-}
      - DEFAULT_FROM_EMAIL=${DEFAULT_FROM_EMAIL:-}
      - ALERT_EMAIL=${ALERT_EMAIL:-apettas@gmail.com}
    networks:
      - pdede_network
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Host: sadeies.pdede.gov.gr", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cloudflare-ips.conf:/etc/nginx/cloudflare-ips.conf:ro
      - ./nginx/security-limits.conf:/etc/nginx/security-limits.conf:ro
      - ./nginx/security-locations.conf:/etc/nginx/security-locations.conf:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - web
    networks:
      - pdede_network

  # Backup service
  backup:
    image: postgres:15-alpine
    restart: "no"
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - ./backups:/backups
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    command: >
      sh -c "
        pg_dump -h db -U ${DB_USER} -d ${DB_NAME} > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql &&
        find /backups -name '*.sql' -mtime +7 -delete
      "
    depends_on:
      - db
    networks:
      - pdede_network
    profiles:
      - backup

  netdata:
    image: netdata/netdata:stable
    restart: unless-stopped
    hostname: pdede-leaves
    pid: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdata_config:/etc/netdata
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /var/log:/host/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/netdata/health_alarm_notify.conf:/etc/netdata/health_alarm_notify.conf:ro
      - ./monitoring/netdata/msmtprc:/etc/msmtprc:ro
    environment:
      - NETDATA_CLAIM_TOKEN=${NETDATA_CLAIM_TOKEN:-}
      - NETDATA_CLAIM_URL=${NETDATA_CLAIM_URL:-https://app.netdata.cloud}
      - DOCKER_HOST=/var/run/docker.sock
    ports:
      - "127.0.0.1:${NETDATA_PORT:-19999}:19999"
    networks:
      - pdede_network

  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      - "127.0.0.1:${UPTIME_KUMA_PORT:-3001}:3001"
    networks:
      - pdede_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  private_media_volume:
  netdata_config:
  netdata_lib:
  netdata_cache:
  uptime_kuma_data:

networks:
  pdede_network:
    driver: bridge

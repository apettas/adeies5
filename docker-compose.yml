services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./backups:/backups
    environment:
      POSTGRES_DB: ${DB_NAME:-pdede_leaves}
      POSTGRES_USER: ${DB_USER:-pdede_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pdede_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=el_GR.UTF-8 --lc-ctype=el_GR.UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - pdede_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-pdede_user} -d ${DB_NAME:-pdede_leaves}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - pdede_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: 
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - private_media_volume:/app/private_media
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY:-django-insecure-pdede-leave-system-secret-key-change-in-production}
      - DB_NAME=${DB_NAME:-pdede_leaves}
      - DB_USER=${DB_USER:-pdede_user}
      - DB_PASSWORD=${DB_PASSWORD:-pdede_password}
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_URL=redis://redis:6379/0
    networks:
      - pdede_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cloudflare-ips.conf:/etc/nginx/cloudflare-ips.conf:ro
      - ./nginx/security-limits.conf:/etc/nginx/security-limits.conf:ro
      - ./nginx/security-locations.conf:/etc/nginx/security-locations.conf:ro
      - static_volume:/var/www/static
      - media_volume:/var/www/media
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - web
    networks:
      - pdede_network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  private_media_volume:

networks:
  pdede_network:
    driver: bridge